server {
    server_name ai-usage.biz www.ai-usage.biz rsm.ai-usage.biz mission-viejo.ai-usage.biz lake-forest.ai-usage.biz san-clemente.ai-usage.biz laguna-hills.ai-usage.biz dana-point.ai-usage.biz laguna-woods.ai-usage.biz sjc.ai-usage.biz laguna-beach.ai-usage.biz ladera.ai-usage.biz foothill.ai-usage.biz rmv.ai-usage.biz rancho-cucamonga.ai-usage.biz;

    root /var/www/ai-usage.biz/html;
    index index.html;

    access_log /var/log/nginx/ai-usage.biz.access.log;
    error_log /var/log/nginx/ai-usage.biz.error.log;

    location = /index {
        return 301 /;
    }

    location = /index.html {
        if ($request_uri = /index.html) {
            return 301 /;
        }

        try_files $uri =404;
    }

    location ~ ^/(.+)\.html$ {
        set $clean_path $1;

        if ($request_uri ~ \.html(?:\?|$)) {
            return 301 /$clean_path$is_args$args;
        }

        try_files $uri =404;
    }

    # Future backend route, following the Workflow Shortcuts nginx pattern:
    # proxy /api/ to a local Node service once survey and business-directory
    # persistence moves out of mailto/static files.
    # location /api/ {
    #     proxy_pass http://127.0.0.1:8011/api/;
    #     proxy_http_version 1.1;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }

    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }

    location ~* \.(?:css|js|jpg|jpeg|gif|png|svg|ico|webp|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        try_files $uri =404;
    }

    listen [::]:443 ssl; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/ai-usage.biz/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/ai-usage.biz/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot


}
server {
    if ($host ~ ^(ai-usage\.biz|www\.ai-usage\.biz|rsm\.ai-usage\.biz|mission-viejo\.ai-usage\.biz|lake-forest\.ai-usage\.biz|san-clemente\.ai-usage\.biz|laguna-hills\.ai-usage\.biz|dana-point\.ai-usage\.biz|laguna-woods\.ai-usage\.biz|sjc\.ai-usage\.biz|laguna-beach\.ai-usage\.biz|ladera\.ai-usage\.biz|foothill\.ai-usage\.biz|rmv\.ai-usage\.biz|rancho-cucamonga\.ai-usage\.biz)$) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    listen [::]:80;
    server_name ai-usage.biz www.ai-usage.biz rsm.ai-usage.biz mission-viejo.ai-usage.biz lake-forest.ai-usage.biz san-clemente.ai-usage.biz laguna-hills.ai-usage.biz dana-point.ai-usage.biz laguna-woods.ai-usage.biz sjc.ai-usage.biz laguna-beach.ai-usage.biz ladera.ai-usage.biz foothill.ai-usage.biz rmv.ai-usage.biz rancho-cucamonga.ai-usage.biz;
    return 404; # managed by Certbot




}
